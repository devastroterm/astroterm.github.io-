<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Destek | AstroTerm</title>
    <link rel="stylesheet" href="/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@500;700;900&display=swap" rel="stylesheet">
</head>
<body class="legal-page">
    <div id="star-field"></div>
    <nav class="glass-header">
        <div class="container">
            <div class="logo">
                <a href="/" style="text-decoration: none; color: inherit; display: flex; align-items: center; gap: 0.75rem;">
                    <img src="/assets/player_ship.png" alt="AstroTerm Logo" class="nav-logo">
                    <span>AstroTerm</span>
                </a>
            </div>
        </div>
    </nav>

    <main class="container legal-content">
        <h1 class="gradient-text">Destek</h1>
        <div class="glass-card" style="text-align: center;">
            <p>AstroTerm ile ilgili her türlü soru, öneri veya teknik sorun için bizimle iletişime geçebilirsiniz.</p>
            
            <div style="margin: 3rem 0;">
                <h2 style="color: var(--secondary); margin-bottom: 1rem;">E-Posta</h2>
                <a href="mailto:dev.astroterm@gmail.com" class="btn-primary" style="font-size: 1.2rem;">dev.astroterm@gmail.com</a>
            </div>
            
            <p style="opacity: 0.6;">Tüm taleplerinize en kısa sürede dönüş yapmaya çalışıyoruz.</p>
        </div>
    </main>

    <script type="module" src="/main.js"></script>
</body>
</html>
