name: AstroTerm
options:
  bundleIdPrefix: com.astroterm
targets:
  AstroTerm:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: AstroTerm
    settings:
      base:
        INFOPLIST_FILE: AstroTerm/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.oguzhanakdogan.astroterm
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_TEAM: "" # User set this in Xcode
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1" # iPhone
    dependencies:
      - sdk: SpriteKit.framework
      - sdk: AVFoundation.framework
schemes:
  AstroTerm:
    build:
      targets:
        AstroTerm: [run, test, profile, analyze, archive]
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
