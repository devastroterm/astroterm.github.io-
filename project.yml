name: AstroTerm
options:
  bundleIdPrefix: com.astroterm
targets:
  AstroTerm:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: AstroTerm
    settings:
      base:
        INFOPLIST_FILE: AstroTerm/Info.plist
        VERSION: "1.1.0"
        BUILD: "4"
        ENABLE_BITCODE: "NO"
        DEBUG_INFORMATION_FORMAT: "dwarf-with-dsym"
        PRODUCT_BUNDLE_IDENTIFIER: com.devastroterm.astroterm
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_TEAM: 23Q3MA2NBQ
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1" # iPhone
    dependencies:
      - sdk: SpriteKit.framework
      - sdk: AVFoundation.framework
      - package: Lottie
      - package: GoogleMobileAds
packages:
  Lottie:
    url: https://github.com/airbnb/lottie-ios.git
    from: 4.4.1
  GoogleMobileAds:
    url: https://github.com/googleads/swift-package-manager-google-mobile-ads.git
    from: 11.2.0
schemes:
  AstroTerm:
    build:
      targets:
        AstroTerm: [run, test, profile, analyze, archive]
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
